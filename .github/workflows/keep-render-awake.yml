# Ping Render /health so the free-tier collab service does not sleep.
name: keep-render-awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: curl -fsS --retry 2 --retry-delay 5 "https://hll-tactika-test.onrender.com/health"
