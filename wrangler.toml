# Cloudflare Pages + Workers config for local dev and deploy.
name = "hll-tactika"
pages_build_output_dir = "dist"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 is the primary structured store (pins, users, strats metadata).
# KV remains for Yjs collaboration snapshots only (see docs/migration-plan.md).
[[d1_databases]]
binding = "DB"
database_name = "hll-tactika-db"
database_id = "6d617404-fe7c-4f77-980c-a64fbefde494"
preview_database_id = "101f085d-bbd6-4513-9d21-5d3942df1cc3"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "PINS_KV"
id = "25a3a121f49e4bc082cfa7d565d0890d"
preview_id = "e5ed67e5071744a290fa94f020905a6c"

[[r2_buckets]]
binding = "VIDEOS_R2"
bucket_name = "hll-climb-videos"
preview_bucket_name = "hll-climb-videos-preview"
